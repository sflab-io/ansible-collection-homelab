---
# argument spec file for sflab.homelab.netbox

argument_specs:
  main:
    short_description: Deploy and configure Netbox server
    options:
      netbox_api_token_pepper:
        type: str
        description: >-
          Random secret used by NetBox v4+ to pepper (hash) API tokens.
          Must be stable – changing it invalidates all existing tokens.
          Should be stored encrypted (e.g. via SOPS). Required.
        default: ""

      netbox_create_api_token:
        type: bool
        description: >-
          When true, creates a NetBox API token for the admin user via the REST API
          (/api/users/tokens/provision/) and stores it in HashiCorp Vault KV.
          Uses Basic Auth so NetBox v4 correctly applies API_TOKEN_PEPPERS.
          Requires netbox_api_token_admin_password and Vault connection variables.
        default: false

      netbox_api_token_admin_username:
        type: str
        description: NetBox admin username used for Basic Auth during token provisioning.
        default: "admin"

      netbox_api_token_admin_password:
        type: str
        description: >-
          NetBox admin password used for Basic Auth during token provisioning.
          Required when netbox_create_api_token is true. Store encrypted (e.g. SOPS).
        default: ""

      netbox_api_token_description:
        type: str
        description: >-
          Description stored on the NetBox token object.
        default: "Ansible automation token"

      netbox_api_url:
        type: str
        description: >-
          Base URL of the NetBox REST API used for token provisioning.
          Defaults to localhost, which works when the task runs on the NetBox host itself.
        default: "http://127.0.0.1"

      netbox_api_validate_certs:
        type: bool
        description: Whether to validate the NetBox TLS certificate during token provisioning.
        default: false

      netbox_vault_api_protocol:
        type: str
        description: Protocol used to reach the Vault API (http or https).
        default: "https"

      netbox_vault_api_host:
        type: str
        description: >-
          Hostname or IP of the Vault server. Required when netbox_create_api_token is true.
        default: ""

      netbox_vault_api_port:
        type: int
        description: Port of the Vault API.
        default: 8200

      netbox_vault_validate_certs:
        type: bool
        description: Whether to validate the Vault TLS certificate.
        default: false

      netbox_vault_role_id:
        type: str
        description: >-
          Vault AppRole role_id with write access to the KV engine.
          Required when netbox_create_api_token is true.
        default: ""

      netbox_vault_secret_id:
        type: str
        description: >-
          Vault AppRole secret_id.
          Required when netbox_create_api_token is true.
        default: ""

      netbox_vault_kv_engine_name:
        type: str
        description: KV v2 engine mount point (must already exist in Vault).
        default: "secrets_homelab"

      netbox_vault_kv_path:
        type: str
        description: Path inside the KV engine where the token is written.
        default: "netbox"
