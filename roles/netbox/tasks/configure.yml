---
#
# Ensures required NetBox runtime configuration entries are present in configuration.py.
# Uses blockinfile so the block is idempotent and does not conflict with the rest
# of the file that is managed by gmazoyer.netbox.
#
# Currently manages:
#   - API_TOKEN_PEPPERS  (required in NetBox v4+ for API token hashing)
#

- name: Set NetBox configuration file path fact
  ansible.builtin.set_fact:
    __netbox_config_file: "{{ netbox_install_directory | default('/opt/netbox') }}/netbox/netbox/configuration.py"

- name: Ensure API_TOKEN_PEPPERS is present in NetBox configuration
  ansible.builtin.blockinfile:
    path: "{{ __netbox_config_file }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - API_TOKEN_PEPPERS"
    block: |
      API_TOKEN_PEPPERS = {
          1: "{{ netbox_api_token_pepper }}",
      }
  become: true
  notify: Restart NetBox service
