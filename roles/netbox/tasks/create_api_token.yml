---
#
# This task file creates a NetBox API token via the REST API and stores it in Vault KV.
#
# Idempotency: Checks Vault KV for an existing token before creating a new one.
#              If a token already exists in Vault, the task is skipped entirely.
#              A new token is only provisioned when Vault has no entry yet.
#
# Why REST API instead of Django shell:
#   NetBox v4+ uses API_TOKEN_PEPPERS to hash tokens before storing them in the
#   database. Tokens created via the Django shell bypass this mechanism and are
#   stored as plain hex ("v1 tokens"), which NetBox then rejects with
#   "Invalid v1 token". The /api/users/tokens/provision/ endpoint goes through
#   the full authentication pipeline and correctly applies the pepper.
#
# Prerequisites:
# - NetBox must be running and reachable at netbox_api_url
# - Vault must be reachable and configured with the KV engine and AppRole credentials
#

- name: Set Vault URL fact
  ansible.builtin.set_fact:
    __netbox_vault_url: "{{ netbox_vault_api_protocol }}://{{ netbox_vault_api_host }}:{{ netbox_vault_api_port }}"

- name: Check if NetBox API token already exists in Vault KV
  community.hashi_vault.vault_kv2_get:
    url: "{{ __netbox_vault_url }}"
    auth_method: "approle"
    role_id: "{{ netbox_vault_role_id }}"
    secret_id: "{{ netbox_vault_secret_id }}"
    validate_certs: "{{ netbox_vault_validate_certs }}"
    engine_mount_point: "{{ netbox_vault_kv_engine_name }}"
    path: "{{ netbox_vault_kv_path }}"
  register: __netbox_vault_token_check
  ignore_errors: true
  delegate_to: localhost
  no_log: true

- name: Skip token creation — token already stored in Vault
  when: not __netbox_vault_token_check.failed
  ansible.builtin.debug:
    msg: "NetBox API token already exists in Vault at {{ netbox_vault_kv_engine_name }}/{{ netbox_vault_kv_path }}, skipping creation."

- name: Create and store NetBox API token
  when: __netbox_vault_token_check.failed
  block:
    - name: Provision NetBox API token via REST API
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/users/tokens/provision/"
        method: POST
        body_format: json
        body:
          username: "{{ netbox_api_token_admin_username }}"
          password: "{{ netbox_api_token_admin_password }}"
          description: "{{ netbox_api_token_description }}"
        status_code: [200, 201]
        validate_certs: "{{ netbox_api_validate_certs }}"
      register: __netbox_api_token_result
      changed_when: __netbox_api_token_result.status == 201

    - name: Store NetBox API token in Vault KV
      community.hashi_vault.vault_kv2_write:
        url: "{{ __netbox_vault_url }}"
        auth_method: "approle"
        role_id: "{{ netbox_vault_role_id }}"
        secret_id: "{{ netbox_vault_secret_id }}"
        validate_certs: "{{ netbox_vault_validate_certs }}"
        engine_mount_point: "{{ netbox_vault_kv_engine_name }}"
        path: "{{ netbox_vault_kv_path }}"
        data:
          api_token: "nbt_{{ __netbox_api_token_result.json.key }}.{{ __netbox_api_token_result.json.token }}"
      delegate_to: localhost
      no_log: true

    - name: Display token storage confirmation
      ansible.builtin.debug:
        msg: "NetBox API token successfully stored in Vault at {{ netbox_vault_kv_engine_name }}/{{ netbox_vault_kv_path }}"
