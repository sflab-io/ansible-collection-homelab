---
- name: Include task from postgresql.yml
  ansible.builtin.include_tasks: postgres.yml

- name: Include task from redis.yml
  ansible.builtin.include_tasks: redis.yml

- name: Include task from role gmazoyer.netbox
  ansible.builtin.include_role:
    name: gmazoyer.netbox

- name: Apply NetBox runtime configuration
  ansible.builtin.include_tasks: configure.yml

- name: Apply database migrations and collect static files
  ansible.builtin.include_tasks: migrate.yml

- name: Create NetBox API token and store in Vault
  when: netbox_create_api_token | bool
  ansible.builtin.include_tasks: create_api_token.yml
