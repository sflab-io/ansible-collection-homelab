---
#
# This task file reads the AppRole Role ID, generates a Secret ID (only if the
# output file does not already exist), and saves the credentials to a JSON file.
#
# Idempotency: Secret ID is only generated if the output file does not exist.
#
# Prerequisites:
# - __vault_secrets_init_data fact must be set (loaded via load_vault_init_data.yml)
# - __vault_secrets_url fact must be set (loaded via load_vault_init_data.yml)
# - AppRole role must exist (created via configure_approle.yml)
#

- name: Check if AppRole credentials output file already exists
  ansible.builtin.stat:
    path: "{{ vault_secrets_output_file }}"
  register: __vault_secrets_output_file_stat

- name: Read AppRole Role ID
  ansible.builtin.uri:
    url: "{{ __vault_secrets_url }}/v1/auth/approle/role/{{ vault_secrets_approle_name }}/role-id"
    method: GET
    headers:
      X-Vault-Token: "{{ __vault_secrets_init_data.root_token }}"
    validate_certs: "{{ vault_secrets_validate_certs }}"
    status_code:
      - 200
  register: __vault_secrets_role_id_response
  no_log: true
  when: not __vault_secrets_output_file_stat.stat.exists

- name: Generate AppRole Secret ID
  sflab.homelab.vault_write:
    url: "{{ __vault_secrets_url }}"
    auth_method: "token"
    token: "{{ __vault_secrets_init_data.root_token }}"
    path: "auth/approle/role/{{ vault_secrets_approle_name }}/secret-id"
    validate_certs: "{{ vault_secrets_validate_certs }}"
    data: {}
  register: __vault_secrets_secret_id_response
  no_log: true
  when: not __vault_secrets_output_file_stat.stat.exists

- name: Save AppRole credentials to output file
  ansible.builtin.copy:
    content: "{{ __vault_secrets_credentials | to_nice_json }}\n"
    dest: "{{ vault_secrets_output_file }}"
    mode: "0600"
  vars:
    __vault_secrets_credentials:
      role_id: "{{ __vault_secrets_role_id_response.json.data.role_id }}"
      secret_id: "{{ __vault_secrets_secret_id_response.response.data.secret_id }}"
      vault_secrets_engine_name: "{{ vault_secrets_engine_name }}"
      vault_secrets_approle_name: "{{ vault_secrets_approle_name }}"
  when: not __vault_secrets_output_file_stat.stat.exists
  no_log: true

- name: Display AppRole credentials location
  ansible.builtin.debug:
    msg: "AppRole credentials saved to {{ vault_secrets_output_file }}"
  when: not __vault_secrets_output_file_stat.stat.exists

- name: Display AppRole credentials already exist
  ansible.builtin.debug:
    msg: "AppRole credentials file already exists at {{ vault_secrets_output_file }}, skipping generation."
  when: __vault_secrets_output_file_stat.stat.exists
