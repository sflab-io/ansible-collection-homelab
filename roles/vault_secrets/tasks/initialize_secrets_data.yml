---
- name: Check if Vault approle secrets data file exists
  ansible.builtin.stat:
    path: "{{ vault_secrets_output_file }}"
  register: __vault_approle_init_data_stat

- name: Fail if Vault init data file does not exist
  ansible.builtin.fail:
    msg: |
      Vault AppRole credentials file not found at {{ vault_secrets_output_file }}.
      This file should be created by the vault_secrets role during AppRole setup.
      Ensure the output_approle_credentials task has run successfully before this task.
  when: not __vault_approle_init_data_stat.stat.exists

- name: Load Vault AppRole credentials from file
  ansible.builtin.slurp:
    src: "{{ vault_secrets_output_file }}"
  register: __vault_approle_init_data_content
  no_log: true

- name: Parse Vault init data
  ansible.builtin.set_fact:
    __vault_approle_init_data: "{{ __vault_approle_init_data_content.content | b64decode | from_json }}"
  no_log: true

- name: Write approle credentials to Vault for later use
  community.hashi_vault.vault_kv2_write:
    url: "https://{{ ansible_host }}:{{ vault_secrets_api_port }}"
    auth_method: "approle"
    role_id: "{{ __vault_approle_init_data.role_id }}"
    secret_id: "{{ __vault_approle_init_data.secret_id }}"
    engine_mount_point: "{{ vault_secrets_engine_name }}"
    path: "vault"
    data:
      homelab_approle_role_id: "{{ __vault_approle_init_data.role_id }}"
      homelab_approle_secret_id: "{{ __vault_approle_init_data.secret_id }}"
    validate_certs: "{{ vault_secrets_validate_certs }}"
  no_log: true

- name: Write initial secrets data passed from playbook to Vault
  community.hashi_vault.vault_kv2_write:
    url: "https://{{ ansible_host }}:{{ vault_secrets_api_port }}"
    auth_method: "approle"
    role_id: "{{ __vault_approle_init_data.role_id }}"
    secret_id: "{{ __vault_approle_init_data.secret_id }}"
    engine_mount_point: "{{ vault_secrets_engine_name }}"
    path: "{{ vault_secret_data.name }}"
    data: "{{ vault_secret_data.secrets | items2dict }}"
    validate_certs: "{{ vault_secrets_validate_certs }}"
  no_log: true
  loop: "{{ vault_secrets_data }}"
  loop_control:
    loop_var: vault_secret_data
