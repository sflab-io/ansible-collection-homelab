---
#
# This task file loads Vault initialization data and extracts the root token.
#
# Sets the following facts:
# - __vault_pki_vault_init_data: Complete init data structure
# - __vault_pki_vault_init_data.root_token: The Vault root token
#
# Prerequisites:
# - Vault must be initialized (handled by vault role)
# - Variable vault_pki_vault_init_data_file must be defined
#

- name: Check if Vault init data file exists
  ansible.builtin.stat:
    path: "{{ vault_pki_vault_init_data_file }}"
  register: __vault_pki_vault_init_data_stat

- name: Fail if Vault init data file does not exist
  ansible.builtin.fail:
    msg: |
      Vault init data file not found at {{ vault_pki_vault_init_data_file }}.
      This file should be created by the vault role during initialization.
      Ensure the vault role has run successfully before the pki role.
  when: not __vault_pki_vault_init_data_stat.stat.exists

- name: Load Vault init data from file
  ansible.builtin.slurp:
    src: "{{ vault_pki_vault_init_data_file }}"
  register: __vault_pki_vault_init_data_content
  no_log: true # Contains sensitive root token

- name: Parse Vault init data
  ansible.builtin.set_fact:
    __vault_pki_vault_init_data: "{{ __vault_pki_vault_init_data_content.content | b64decode | from_json }}"
  no_log: true # Contains sensitive root token

- name: Verify root token exists in init data
  ansible.builtin.fail:
    msg: |
      Root token not found in Vault init data file {{ vault_pki_vault_init_data_file }}.
      The file may be corrupted or incomplete.
  when: __vault_pki_vault_init_data.root_token is not defined or __vault_pki_vault_init_data.root_token == ""
