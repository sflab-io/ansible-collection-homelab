---
#
# This task file configures the intermediate CA PKI secret engine in Vault.
#
# Prerequisites:
# - __vault_pki_vault_init_data fact must be set (loaded via load_vault_init_data.yml)
#

# - name: Debug variables
#   ansible.builtin.debug:
#     msg: |
#       Configuring PKI Intermediate CA Secret Engine with parameters:
#         __vault_pki_vault_url: {{ __vault_pki_vault_url }}
#         vault_pki_intermediate_mount_point: {{ vault_pki_intermediate_mount_point }}
#         vault_pki_intermediate_description: {{ vault_pki_intermediate_description }}
#         vault_pki_intermediate_default_lease_ttl: {{ vault_pki_intermediate_default_lease_ttl }}
#         vault_pki_intermediate_max_lease_ttl: {{ vault_pki_intermediate_max_lease_ttl }}
#         vault_pki_intermediate_replace_different_backend: {{ vault_pki_intermediate_replace_different_backend }}

- name: Enable and configure intermediate CA PKI secret engine
  sflab.homelab.vault_pki_secret_engine:
    url: "{{ __vault_pki_vault_url }}"
    auth_method: "token"
    token: "{{ __vault_pki_vault_init_data.root_token }}"
    validate_certs: "{{ vault_pki_vault_api_validate_certs }}"
    engine_mount_point: "{{ vault_pki_intermediate_mount_point }}"
    state: "present"
    description: "{{ vault_pki_intermediate_description }}"
    default_lease_ttl: "{{ vault_pki_intermediate_default_lease_ttl }}"
    max_lease_ttl: "{{ vault_pki_intermediate_max_lease_ttl }}"
    replace_different_backend_type: "{{ vault_pki_intermediate_replace_different_backend }}"
  no_log: true # Token in parameters
  register: __vault_pki_intermediate_engine_result
# - name: Display PKI intermediate engine configuration status
#   ansible.builtin.debug:
#     msg: |
#       PKI Intermediate Engine Status:
#         Changed: {{ __vault_pki_intermediate_engine_result.changed }}
#         Mount Point: {{ vault_pki_root_mount_point }}
#         Default Lease TTL: {{ vault_pki_root_default_lease_ttl }}
#         Max Lease TTL: {{ vault_pki_root_max_lease_ttl }}
#   when: __vault_pki_intermediate_engine_result is defined
