---
#
# This task file configures the intermediate CA PKI secret engine in Vault for ACME support.
#
# Prerequisites:
# - __vault_pki_vault_init_data fact must be set (loaded via load_vault_init_data.yml)
#

# - name: Debug variables
#   ansible.builtin.debug:
#     msg: |
#       Configuring PKI Intermediate CA with the following parameters:
#         __vault_pki_vault_url: {{ __vault_pki_vault_url }}
#         vault_pki_intermediate_mount_point: {{ vault_pki_intermediate_mount_point }}

- name: Tune PKI intermediate CA for ACME support
  sflab.homelab.vault_secrets_tune:
    url: "{{ __vault_pki_vault_url }}"
    auth_method: "token"
    token: "{{ __vault_pki_vault_init_data.root_token }}"
    validate_certs: "{{ vault_pki_vault_api_validate_certs }}"
    engine_mount_point: "{{ vault_pki_intermediate_mount_point }}"
    passthrough_request_headers:
      - If-Modified-Since
    allowed_response_headers:
      - Last-Modified
      - Location
      - Replay-Nonce
      - Link

- name: Configure ACME support in PKI intermediate CA
  sflab.homelab.vault_write:
    url: "{{ __vault_pki_vault_url }}"
    auth_method: "token"
    token: "{{ __vault_pki_vault_init_data.root_token }}"
    validate_certs: "{{ vault_pki_vault_api_validate_certs }}"
    path: "{{ vault_pki_intermediate_mount_point }}/config/acme"
    data:
      enabled: true

- name: Configure PKI cluster URL for ACME directory
  sflab.homelab.vault_write:
    url: "{{ __vault_pki_vault_url }}"
    auth_method: "token"
    token: "{{ __vault_pki_vault_init_data.root_token }}"
    validate_certs: "{{ vault_pki_vault_api_validate_certs }}"
    path: "{{ vault_pki_intermediate_mount_point }}/config/cluster"
    data:
      path: "{{ vault_pki_vault_cluster_path }}"
      aia_path: "{{ vault_pki_vault_cluster_path }}"
