---
#
# This task file configures the root CA PKI secret engine in Vault.
#
# Prerequisites:
# - __vault_pki_vault_init_data fact must be set (loaded via load_vault_init_data.yml)
#

# - name: Debug variables
#   ansible.builtin.debug:
#     msg: |
#       Configuring PKI Root CA with the following settings:
#         Vault URL: {{ __vault_pki_vault_url }}
#         Mount Point: {{ vault_pki_root_mount_point }}
#         Description: {{ vault_pki_root_description }}
#         Default Lease TTL: {{ vault_pki_root_default_lease_ttl }}
#         Max Lease TTL: {{ vault_pki_root_max_lease_ttl }}
#         Replace Different Backend: {{ vault_pki_root_replace_different_backend }}

- name: Enable and configure root CA PKI secret engine
  sflab.homelab.vault_pki_secret_engine:
    url: "{{ __vault_pki_vault_url }}"
    auth_method: "token"
    token: "{{ __vault_pki_vault_init_data.root_token }}"
    validate_certs: "{{ vault_pki_vault_api_validate_certs }}"
    engine_mount_point: "{{ vault_pki_root_mount_point }}"
    state: "present"
    description: "{{ vault_pki_root_description }}"
    default_lease_ttl: "{{ vault_pki_root_default_lease_ttl }}"
    max_lease_ttl: "{{ vault_pki_root_max_lease_ttl }}"
    replace_different_backend_type: "{{ vault_pki_root_replace_different_backend }}"
  no_log: true # Token in parameters
  register: __vault_pki_root_engine_result
# - name: Display PKI root engine configuration status
#   ansible.builtin.debug:
#     msg: |
#       PKI Root Engine Status:
#         Changed: {{ __vault_pki_root_engine_result.changed }}
#         Mount Point: {{ vault_pki_root_mount_point }}
#         Default Lease TTL: {{ vault_pki_root_default_lease_ttl }}
#         Max Lease TTL: {{ vault_pki_root_max_lease_ttl }}
#   when: __vault_pki_root_engine_result is defined
