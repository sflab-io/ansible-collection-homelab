---
# defaults file for sflab.homelab.netbox_init

# NetBox connection must be set in inventory, vault, or extra-vars
netbox_url: ""
netbox_init_token: ""

# KV v2 engine mount point (must already exist in Vault).
vault_kv_engine_name: "secrets_homelab"

# Path inside the KV engine where the token is stored.
vault_kv_path: "netbox"
