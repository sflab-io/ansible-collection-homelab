---
# Validating all used variables
- name: Validate VLAN config
  ansible.utils.validate:
    data: "{{ firewall_vlans }}"
    criteria:
      - "{{ lookup('file', '../criteria/firewall_vlans.json') | from_json }}"
    engine: ansible.utils.jsonschema
  when: firewall_vlans.keys() | length > 0

- name: Validate interfaces config
  ansible.utils.validate:
    data: "{{ firewall_interfaces }}"
    criteria:
      - "{{ lookup('file', '../criteria/firewall_interfaces.json') | from_json }}"
    engine: ansible.utils.jsonschema
  when: firewall_vlans.keys() | length > 0

