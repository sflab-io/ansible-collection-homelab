---
- name: Create required base directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/docker"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create required compose directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/docker/{{ item.name }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy docker-compose file for {{ item.name }}
  ansible.builtin.template:
    src: docker-compose-{{ item.name }}.yml.j2
    dest: "/home/{{ ansible_user }}/docker/{{ item.name }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Create .env file for {{ item.name }}
  when: item.env_vars is defined
  ansible.builtin.template:
    src: dotenv.j2
    dest: "/home/{{ ansible_user }}/docker/{{ item.name }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Create and start service
  community.docker.docker_compose_v2:
    project_src: docker/{{ item.name }}
  register: docker_output

- name: Show results only if verbose mode is enabled
  when: ansible_verbosity > 0
  ansible.builtin.debug:
    var: docker_output
